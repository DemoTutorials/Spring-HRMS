server.port=${EMAIL_SERVER_PORT}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
upload.directory=${UPLOAD_DIRECTORY}
upload.directory.type=${UPLOAD_DIRECTORY_TYPE}
upload.directory.max-size=${UPLOAD_DIRECTORY_MAX_SIZE}
spring.quartz.job-store-type=jdbc
spring.quartz.properties.org.quartz.threadPool.threadCount=${QUARTZ_THREAD_COUNT}
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.datasource.url=${EMAIL_DB_URL}
spring.datasource.username=${EMAIL_DB_USERNAME}
spring.datasource.password=${EMAIL_DB_PASSWORD}
spring.datasource.hikari.schema=${EMAIL_DB_SCHEMA}
spring.jpa.properties.hibernate.default_schema=${EMAIL_HIBERNATE_SCHEMA}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=-1
spring.servlet.multipart.max-request-size=-1